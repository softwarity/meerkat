name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# One pipeline per branch: only the newest commit needs blessing.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - uses: golangci/golangci-lint-action@v9

  # Build and unit-test natively on the three OSes the binary ships for.
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...

  build:
    name: Cross-compile
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache: false
      - name: Cross-compile
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos=${target%/*} goarch=${target#*/}
            ext=""; [ "$goos" = windows ] && ext=".exe"
            echo "building $goos/$goarch"
            GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags '-s -w' \
              -o "dist/meerkat-$goos-$goarch$ext" ./cmd/meerkat
          done
      - uses: actions/upload-artifact@v7
        with:
          name: meerkat-binaries
          path: dist/*
          if-no-files-found: error

  # Publish only once everything is green. main publishes `latest` (+ `main`);
  # any other branch publishes only its own `:<branch>` tag — a throwaway image
  # to test that branch on a real cluster, never latest. Off PRs.
  image:
    name: Build & publish image
    needs: [lint, test, build]
    if: success() && github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_docker.yml
