name: Deploy Doc to GitHub Pages
run-name: ${{ github.actor }} deploy doc on ${{ github.repository }}

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-doc.yml'
  # A release changes no docs/** file, so redeploy on it too — that regenerates
  # assets/version.json (the pinned tag shown in the snippets) from the new tag.
  release:
    types: [published]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # need the tags so gen-version.mjs can resolve the latest release

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install doc-site deps
        working-directory: docs
        run: npm ci

      - name: Build doc-site for GitHub Pages
        working-directory: docs
        run: npm run build -- --base-href /meerkat/

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs/dist/doc-site/browser'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
