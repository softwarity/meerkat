name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version part to bump
        type: choice
        required: true
        default: patch
        options: [patch, minor, major]

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Persist the PAT so the tag push triggers docker-release.yml.
          token: ${{ secrets.PAT_TOKEN }}

      - name: Release
        uses: softwarity/release-flow@v1
        with:
          bump: ${{ inputs.bump }}
          # language auto-detected: no manifest → tag (version lives in the git tags)
